services:
  - type: worker
    name: ayesha-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: SATYA_USER_ID
        sync: false
        value: "7425676908"
